version: '3.8'

services:
  # === PROD ENVIRONMENT ===
  backend:
    build: ./backend
    container_name: comandas_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=super-secret-key-change-it-in-production-1234567890
      - CORS_ORIGINS=https://comandas.sourdev.app,http://localhost:3000
      - DATABASE_URL=sqlite:////app/database_data/database.db
    volumes:
      - ./backend/database_data:/app/database_data

  frontend:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://comandas.sourdev.app/api
        NEXT_PUBLIC_WS_URL: wss://comandas.sourdev.app/ws
    container_name: comandas_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # === DEMO ENVIRONMENT ===
  backend_demo:
    build: ./backend
    container_name: comandas_backend_demo
    restart: always
    ports:
      - "8001:8000"
    environment:
      - SECRET_KEY=demo-secret-key-change-it-in-production-0987654321
      - CORS_ORIGINS=https://demo.comandas.sourdev.app
      - DATABASE_URL=sqlite:////app/database_data/database_demo.db
    volumes:
      - ./backend/database_demo_data:/app/database_data

  frontend_demo:
    build: 
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://demo.comandas.sourdev.app/api
        NEXT_PUBLIC_WS_URL: wss://demo.comandas.sourdev.app/ws
    container_name: comandas_frontend_demo
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - backend_demo
